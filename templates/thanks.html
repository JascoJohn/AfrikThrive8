<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AfrikThrive8 Foundation — Thank You</title>
<link rel="stylesheet" href="{{ url_for('static', filename='brand.css') }}">
</head>
<body>
<div class="wrap">
  <img class="logo" src="{{ url_for('static', filename='logo.png') }}" alt="AfrikThrive8 Foundation">
  <div class="card">
    <div style="padding:48px 28px;text-align:center;">
      <div style="width:54px;height:54px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;">&#10003;</div>
      <h2 style="margin:0 0 8px;font-size:19px;color:var(--navy);">{{ heading }}</h2>
      <p style="margin:0;font-size:14px;color:#5c5946;line-height:1.6;">{{ message }}</p>
    </div>
  </div>
  <p class="foot"><strong>AfrikThrive8 Foundation</strong> · afrikthrive8@outlook.com</p>
</div>
</body>
</html>
